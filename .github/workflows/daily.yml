name: Daily digest

on:
  # Triggered ONLY by an external scheduler (cron-job.org) that POSTs to the
  # workflow_dispatch REST API each morning. GitHub's own `schedule:` cron was
  # removed: it silently dropped every scheduled run (zero `schedule` events
  # ever fired) while manual dispatch always worked. See docs/decisions/0003.
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --only main --no-interaction

      - name: Run digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: poetry run news-agent run
