name: Daily digest

on:
  schedule:
    # 06:17 UTC = 07:17 BST (British Summer Time).
    # The :17 minute is deliberate — top-of-hour (:00) crons are the most
    # congested on GitHub and get heavily delayed or silently dropped under
    # load; an off-peak minute is far more reliable.
    # GitHub cron is fixed UTC and does NOT follow DST, so in winter (GMT)
    # this fires at 06:17 local. Bump the hour to 7 for a strict ~7am in GMT.
    # Scheduled runs can still be delayed; allow some slack.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --only main --no-interaction

      - name: Run digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: poetry run news-agent run
